<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #3367d6;
    }
    button.export {
      background: #34a853;
    }
    button.export:hover {
      background: #2e8b47;
    }
    button.phone {
      background: #ea4335;
    }
    button.phone:hover {
      background: #d33426;
    }
    #status {
      margin: 10px 0;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .data-section {
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 4px;
    }
    .button-group {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .button-group button {
      flex: 1;
      min-width: 120px;
    }
  </style>
</head>
<body>
  <h3>Maps Data Extractor</h3>
  
  <div class="button-group">
    <button id="extractBusiness">Business Info</button>
    <button id="extractSearch">Search Results</button>
    <button id="extractReviews">Reviews</button>
    <button id="extractPhones" class="phone">Phone Numbers</button>
  </div>
  
  <button id="exportCSV" class="export" disabled>Export to CSV</button>
  
  <div id="status"></div>
  
  <div class="data-section">
    <h4>Extracted Data:</h4>
    <pre id="output"></pre>
  </div>

  <script src="popup.js"></script>
</body>
</html>
